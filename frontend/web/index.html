<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Global Talent Exchange: a premium football talent trading, live match center, and wallet experience.">
  <meta name="theme-color" content="#03060C">
  <meta property="og:title" content="Global Talent Exchange">
  <meta property="og:description" content="Trade football upside, run the matchday universe, and manage capital in one premium app.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GTEX">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Global Talent Exchange</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #03060c;
    }

    body {
      color: #f5f8fc;
      font-family: "Segoe UI", sans-serif;
    }

    #gtex-boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(53, 223, 178, 0.12), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(157, 255, 104, 0.1), transparent 20%),
        linear-gradient(180deg, #07101a 0%, #04070c 42%, #020408 100%);
    }

    #gtex-boot.is-hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .gtex-boot-card {
      width: min(100% - 2rem, 18rem);
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      background: linear-gradient(180deg, rgba(16, 25, 40, 0.96), rgba(7, 12, 20, 0.92));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .gtex-boot-card img {
      width: 4.5rem;
      height: 4.5rem;
      margin: 0 auto 1rem;
      object-fit: contain;
    }

    .gtex-boot-card strong {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
    }

    .gtex-boot-card span {
      color: #aeb8c9;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="gtex-boot" aria-hidden="true">
    <div class="gtex-boot-card">
      <img src="icons/Icon-192.png" alt="">
      <strong>GTEX</strong>
      <span>Launching Global Talent Exchange...</span>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('gtex-boot');
      if (boot) {
        boot.classList.add('is-hidden');
        window.setTimeout(function () {
          boot.remove();
        }, 260);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
